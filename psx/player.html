<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSX Disc Drive</title>
<style>
  :root{
    --navy-0:#020716; --navy-1:#061233; --navy-2:#0b2a63; --blue:#2f6cd6;
    --cyan:#8fd0ff; --ice:#dff1ff; --gold:#d8b25a; --txt:#e9f3ff;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; background:#000; overflow:hidden; color:var(--txt);
    font-family:"Segoe UI","Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  #stage{position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(120% 90% at 50% 32%, #07173a 0%, #030a1d 55%, #000 100%);}

  /* emulator host = the screen bezel (canvas lives in its shadow root) */
  wasmpsx-player{display:block; border-radius:10px; overflow:hidden;
    border:1px solid rgba(143,208,255,.28);
    box-shadow:0 0 0 6px rgba(4,12,28,.85), 0 0 50px rgba(47,108,214,.30),
               inset 0 0 60px rgba(0,0,0,.6);}

  /* ---------- INSERT DISC overlay ---------- */
  #overlay{position:fixed; inset:0; z-index:5; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:22px; text-align:center;
    transition:opacity .6s ease; padding:24px;
    background:radial-gradient(120% 90% at 50% 32%, #07173a 0%, #030a1d 55%, #000 100%);}
  #overlay.hide{opacity:0; pointer-events:none;}
  .disc{width:122px; height:122px; border-radius:50%; position:relative;
    background:conic-gradient(from 0deg,#0a1f4a,#2f6cd6,#8fd0ff,#2f6cd6,#0a1f4a);
    box-shadow:0 0 40px rgba(80,150,255,.45), inset 0 0 30px rgba(0,0,0,.6);
    animation:spin 3.2s linear infinite;}
  .disc::after{content:""; position:absolute; inset:50% auto auto 50%; width:36px; height:36px;
    transform:translate(-50%,-50%); border-radius:50%; background:var(--navy-0);
    box-shadow:inset 0 0 0 2px rgba(143,208,255,.5);}
  .disc::before{content:""; position:absolute; inset:14px; border-radius:50%;
    border:1px solid rgba(223,241,255,.15);}
  @keyframes spin{to{transform:rotate(360deg);}}

  h1{font-size:20px; letter-spacing:6px; font-weight:700; color:var(--ice);
    text-shadow:0 0 18px rgba(143,208,255,.5);}
  .sub{font-size:12px; letter-spacing:1.5px; color:#9bb6e6; max-width:430px; line-height:1.7;}

  .btn{appearance:none; border:1px solid rgba(143,208,255,.55);
    background:linear-gradient(160deg, rgba(47,108,214,.35), rgba(8,24,64,.55));
    color:var(--ice); font-size:13px; letter-spacing:2px; font-weight:600;
    padding:14px 32px; border-radius:10px; cursor:pointer; transition:.18s;
    text-transform:uppercase; box-shadow:0 4px 18px rgba(0,0,0,.4);}
  .btn:hover{border-color:var(--cyan);
    background:linear-gradient(160deg, rgba(47,108,214,.6), rgba(8,24,64,.7));
    transform:translateY(-1px); box-shadow:0 0 22px rgba(80,150,255,.4);}
  .formats{font-size:11px; letter-spacing:1px; color:#6f8bbf;}
  .pulse{color:var(--gold); letter-spacing:3px; font-size:12px;
    animation:blink 1.4s steps(2) infinite;}
  @keyframes blink{50%{opacity:.25;}}

  /* ---------- shared console-style key pills ---------- */
  .keys{display:flex; gap:8px; flex-wrap:wrap; justify-content:center; max-width:560px;}
  .pill{display:inline-flex; align-items:center; gap:6px; font-size:11px; letter-spacing:1px;
    padding:5px 10px; border-radius:7px; color:#cdddf6;
    background:linear-gradient(90deg, rgba(60,120,255,.16), rgba(60,120,255,.05));
    border:1px solid rgba(143,208,255,.18);}
  .pill b{color:var(--cyan); font-weight:700; font-size:11px;}
  .pill .ico{color:var(--ice); font-weight:700; min-width:14px; text-align:center;}

  /* ---------- in-game bottom control bar ---------- */
  #bar{position:fixed; left:0; right:0; bottom:0; z-index:4; padding:10px 14px;
    display:flex; justify-content:center; gap:8px; flex-wrap:wrap;
    background:linear-gradient(transparent, rgba(2,8,24,.92)); opacity:.5;
    transition:opacity .25s; pointer-events:none;}
  #bar:hover{opacity:1;}
  #stage:hover ~ #bar{opacity:.92;}

  /* ---------- click-to-focus hint ---------- */
  #focusHint{position:fixed; inset:0; z-index:6; display:none;
    align-items:flex-start; justify-content:center; pointer-events:none;}
  #focusHint.on{display:flex;}
  #focusHint span{margin-top:18px; font-size:12px; letter-spacing:2px; color:var(--navy-0);
    background:var(--cyan); padding:8px 16px; border-radius:20px; font-weight:700;
    box-shadow:0 4px 18px rgba(0,0,0,.5); animation:bob 1.3s ease-in-out infinite;}
  @keyframes bob{50%{transform:translateY(4px);}}

  /* ---------- loading ---------- */
  #loading{position:fixed; inset:0; z-index:7; display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:20px; background:rgba(2,7,22,.85);}
  #loading.on{display:flex;}
  .ldtxt{color:var(--cyan); letter-spacing:3px; font-size:13px; font-weight:700;
    animation:blink 1.4s steps(2) infinite;}
  .barload{width:240px; height:6px; border-radius:3px; background:rgba(143,208,255,.15); overflow:hidden;}
  .barload i{display:block; height:100%; width:35%; border-radius:3px;
    background:linear-gradient(90deg,#3f8fff,#8fd0ff); animation:load 1.1s ease-in-out infinite;}
  @keyframes load{0%{margin-left:-35%;}100%{margin-left:100%;}}
</style>
</head>
<body>
  <div id="stage">
    <wasmpsx-player></wasmpsx-player>
  </div>

  <!-- INSERT DISC -->
  <div id="overlay">
    <div class="disc"></div>
    <h1>INSERT DISC</h1>
    <div class="sub">A real PlayStation, emulated in your browser via WebAssembly.
      No BIOS required — choose a disc image to boot.</div>
    <button class="btn" id="choose">▶ Choose Disc</button>
    <input id="file" type="file" accept=".bin,.cue,.iso,.img,.exe,.psx,.pbp" style="display:none">
    <div class="formats">.bin · .cue · .iso · .img · .exe (PS-EXE)</div>
    <div class="keys" id="keysIntro"></div>
    <div class="pulse">SCEA · LICENSED PRODUCT</div>
  </div>

  <!-- in-game controls -->
  <div id="bar"></div>

  <!-- click to focus -->
  <div id="focusHint"><span>↳ CLICK THE SCREEN TO USE THE CONTROLLER</span></div>

  <!-- reading disc -->
  <div id="loading">
    <div class="ldtxt">READING DISC…</div>
    <div class="barload"><i></i></div>
  </div>

<!-- Safari/Mac: capture any AudioContext the emulator creates so we can resume it
     on a user gesture. Safari (and Chrome autoplay policy) start contexts suspended;
     without this, emulated audio is silent until — and often after — first input.
     MUST run before wasmpsx.min.js so we wrap the constructor before it's used. -->
<script>
  window.__ACs = [];
  const __OAC = window.AudioContext || window.webkitAudioContext;
  if(__OAC){
    const Wrapped = function(...a){ const c = new __OAC(...a); window.__ACs.push(c); return c; };
    Wrapped.prototype = __OAC.prototype;
    window.AudioContext = Wrapped;
    window.webkitAudioContext = Wrapped;   // Safari still ships the prefixed name
  }
  window.__resumeAudio = ()=> window.__ACs.forEach(c=>{ if(c.state==='suspended') c.resume().catch(()=>{}); });
</script>
<script src="wasmpsx.min.js"></script>
<script>
  // ----- real wasmpsx (TJWei / PCSX-R) keyboard map -----
  const MAP = [
    {ico:'✕', k:'Z'}, {ico:'◯', k:'X'}, {ico:'△', k:'D'}, {ico:'▢', k:'S'},
    {ico:'D-Pad', k:'Arrows'}, {ico:'Start', k:'V'}, {ico:'Select', k:'C'},
    {ico:'L1', k:'W'}, {ico:'R1', k:'R'}, {ico:'L2', k:'E'}, {ico:'R2', k:'T'},
  ];
  const pill = m => `<span class="pill"><span class="ico">${m.ico}</span><b>${m.k}</b></span>`;
  document.getElementById('keysIntro').innerHTML = MAP.map(pill).join('');
  document.getElementById('bar').innerHTML       = MAP.map(pill).join('');

  const player   = document.querySelector('wasmpsx-player');
  const overlay  = document.getElementById('overlay');
  const loading  = document.getElementById('loading');
  const fileIn   = document.getElementById('file');
  const focusHint= document.getElementById('focusHint');

  // Force the shadow-DOM canvas to render crisp + sized (poll until it exists)
  let canvasEl=null;
  function styleCanvas(){
    const c = player.shadowRoot && player.shadowRoot.querySelector('canvas');
    if(!c){ return setTimeout(styleCanvas, 80); }
    canvasEl=c;
    Object.assign(c.style, {
      display:'block', margin:'0', height:'76vh', maxWidth:'96vw',
      objectFit:'contain', background:'#000', border:'0'
    });
    // Safari honours these prefixed values; pixelated covers Chrome/Firefox.
    c.style.setProperty('image-rendering','pixelated');
    c.style.setProperty('image-rendering','-webkit-optimize-contrast');
    c.style.setProperty('image-rendering','pixelated');
    c.tabIndex = 0;  // make the canvas focusable so Safari delivers keydown to it
  }
  styleCanvas();

  // Keyboard focus is essential — SDL only reads keys when the doc/canvas has focus.
  // Safari is stricter than Chrome, so focus the window AND the canvas.
  function grabFocus(){ try{ window.focus(); }catch(e){} try{ canvasEl && canvasEl.focus(); }catch(e){} }
  let booted=false;
  function boot(){
    booted=true;
    overlay.classList.add('hide');
    loading.classList.add('on');
    setTimeout(()=>{
      loading.classList.remove('on');
      grabFocus();
      focusHint.classList.add('on');         // nudge user to click for focus
      setTimeout(()=>focusHint.classList.remove('on'), 6000);
    }, 2600);
  }

  // Any tap re-grabs focus, resumes Safari/Chrome audio, and dismisses the hint.
  // Bind both pointerdown and click for older Safari that lacks Pointer Events.
  function onPoke(){ if(window.__resumeAudio) window.__resumeAudio(); if(booted){ grabFocus(); focusHint.classList.remove('on'); } }
  window.addEventListener('pointerdown', onPoke);
  window.addEventListener('click', onPoke);
  window.addEventListener('keydown', ()=>{ if(window.__resumeAudio) window.__resumeAudio(); });

  document.getElementById('choose').onclick = ()=> fileIn.click();
  fileIn.onchange = function(){
    if(!this.files[0]) return;
    boot();
    player.readFile(this.files[0]);          // <-- real emulation starts here
  };

  // ?rom=<url> auto-boots a bundled / self-supplied disc image
  const rom = new URLSearchParams(location.search).get('rom');
  if(rom){ boot(); player.loadUrl(rom); }
</script>
</body>
</html>
